    <title>exercice BS</title>
    <link rel="stylesheet" href="../css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-3" >
        <div class="row mt-5 gap-2">
            <div class="col-12 border border-primary alert alert-primary">This is a single column.</div>
        </div>
            <div class="row gap-2">
                <div class="col border border-danger alert alert-danger">This is the first column</div>
                <div class="col border border-danger alert alert-danger">This is the second column</div>
            </div>
            <div class="row gap-2">
                <div class="col border border-success alert alert-success">This is the first column</div>
                <div class="col border border-success alert alert-success">This is the second column</div>
                <div class="col border border-success alert alert-success">This is the third column</div>
                <div class="col border border-success alert alert-success">This is the fourth column</div>
            </div>
    </div>
